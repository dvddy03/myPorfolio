<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ajouter un projet | Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/ajouter-projet.js" defer></script>
  </head>
  <body class="min-h-screen bg-[linear-gradient(180deg,_#07111f_0%,_#0a1728_52%,_#07111f_100%)] text-slate-100">
    <main class="mx-auto w-[min(980px,calc(100%-2rem))] py-8">
      <a href="index.html" class="inline-flex rounded-full border border-white/10 bg-white/5 px-5 py-3 font-semibold text-slate-200 transition hover:bg-white/10">Retour a l'accueil Tailwind</a>
      <section class="mt-6 rounded-[32px] border border-white/10 bg-white/5 p-6 shadow-2xl shadow-slate-950/40 backdrop-blur lg:p-8">
        <p class="text-sm font-bold uppercase tracking-[0.35em] text-cyan-300">Formulaire Tailwind</p>
        <h1 class="mt-3 text-4xl font-black text-white">Ajouter un projet</h1>
        <p class="mt-4 max-w-3xl text-lg leading-8 text-slate-300">
          Une version Tailwind du formulaire pour preparer de nouvelles fiches projet avec un rendu
          plus moderne et plus propre.
        </p>

        <form id="project-form" class="mt-8 grid gap-6" novalidate>
          <div class="grid gap-6 rounded-[28px] border border-white/10 bg-slate-950/35 p-6">
            <div>
              <label for="libelle" class="mb-2 block font-semibold text-white">Libelle du projet</label>
              <input id="libelle" name="libelle" type="text" required minlength="4" placeholder="Ex : Deploiement SOC open source" class="w-full rounded-2xl border border-white/10 bg-slate-950/60 px-5 py-4 text-white outline-none ring-0 placeholder:text-slate-500 focus:border-cyan-300" />
            </div>
            <div>
              <label for="description" class="mb-2 block font-semibold text-white">Description</label>
              <textarea id="description" name="description" rows="6" required minlength="20" placeholder="Decrivez le contexte, l'objectif et le resultat du projet" class="w-full rounded-2xl border border-white/10 bg-slate-950/60 px-5 py-4 text-white outline-none ring-0 placeholder:text-slate-500 focus:border-cyan-300"></textarea>
            </div>
            <div>
              <label for="technologies" class="mb-2 block font-semibold text-white">Technologies</label>
              <input id="technologies" name="technologies" type="text" required aria-describedby="technologies-help" placeholder="Ex : Wazuh, Kibana, Suricata, Linux" class="w-full rounded-2xl border border-white/10 bg-slate-950/60 px-5 py-4 text-white outline-none ring-0 placeholder:text-slate-500 focus:border-cyan-300" />
              <p id="technologies-help" class="mt-2 text-sm text-slate-400">Separez les technologies par des virgules.</p>
              <div id="tech-preview" aria-live="polite" class="mt-3 flex flex-wrap gap-2"></div>
            </div>
            <div>
              <label for="image" class="mb-2 block font-semibold text-white">Image du projet</label>
              <input id="image" name="image" type="file" accept=".png,.jpg,.jpeg,.svg" required class="block w-full rounded-2xl border border-dashed border-white/15 bg-slate-950/40 px-5 py-4 text-slate-300 file:mr-4 file:rounded-full file:border-0 file:bg-cyan-300 file:px-4 file:py-2 file:font-semibold file:text-slate-950" />
              <figure id="image-preview-wrapper" aria-live="polite" class="mt-4 hidden overflow-hidden rounded-2xl border border-white/10 bg-slate-950/50 p-3">
                <img id="image-preview" src="" alt="Apercu du visuel du projet" class="h-52 w-full rounded-xl object-cover" />
                <figcaption id="image-preview-caption" class="mt-2 text-sm text-slate-300"></figcaption>
              </figure>
            </div>
          </div>

          <p id="form-message" role="status" aria-live="polite" class="hidden rounded-2xl border px-4 py-3 text-sm font-semibold"></p>

          <button id="submit-button" type="submit" class="inline-flex w-fit rounded-full bg-cyan-300 px-6 py-3 font-bold text-slate-950 transition hover:bg-cyan-200">
            Valider le projet
          </button>

          <section class="rounded-[28px] border border-white/10 bg-slate-950/35 p-6">
            <h2 class="text-xl font-bold text-white">Dernier envoi (JSON)</h2>
            <pre id="json-output" class="mt-4 overflow-x-auto rounded-2xl border border-white/10 bg-slate-950/60 p-4 text-sm text-slate-300"></pre>
          </section>
        </form>
      </section>
    </main>
  </body>
</html>
