# Un Secret stocke des données sensibles (mots de passe, tokens) encodées en Base64.
# IMPORTANT : Base64 n'est PAS du chiffrement ! C'est juste un encodage.
# En production, on utiliserait HashiCorp Vault ou AWS Secrets Manager.
# Les Secrets sont montés comme variables d'environnement dans les conteneurs.
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: myportfolio
type: Opaque   # Opaque = données arbitraires (par opposition à docker-registry, tls, etc.)
data:
  # Valeurs encodées en Base64 : echo -n 'valeur' | base64
  mongo-root-username: YWRtaW4=
  mongo-root-password: cGFzc2Vy
  mongo-db-name: cG9ydGZvbGlv
