# Deployment = le contrôleur qui gère les Pods.
# automountServiceAccountToken: false = bonne pratique sécurité (SonarQube IaC S6473)
# resources = limites CPU/RAM obligatoires en prod pour éviter qu'un pod consomme tout
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
  namespace: myportfolio
  labels:
    app: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      automountServiceAccountToken: false   # Désactive le token SA inutile (sécurité)
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: mongo-root-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: mongo-root-password
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: mongo-db-name
          resources:
            requests:
              memory: "256Mi"   # RAM minimum garantie pour MongoDB
              cpu: "100m"       # 0.1 vCPU minimum
            limits:
              memory: "512Mi"   # RAM maximum autorisée
              cpu: "500m"       # 0.5 vCPU maximum
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongo-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: myportfolio
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
  type: ClusterIP
