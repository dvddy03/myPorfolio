services:

  # ── 1. Base de données MongoDB ────────────────────────────
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  # ── 2. Backend Express ────────────────────────────────────
  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    environment:
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      MONGODB_URI: ${MONGODB_URI}
    depends_on:
      - mongo
    networks:
      - app-network

  # ── 3. Frontend React (nginx) ─────────────────────────────
  frontend:
    build: ./react
    container_name: frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network

# ── Réseau personnalisé (DNS intégré Docker) ─────────────────
networks:
  app-network:
    driver: bridge

# ── Volume nommé pour la persistance MongoDB ─────────────────
volumes:
  mongo_data:
